# Dev MySQL only. App runs on the host (uvicorn); connect via published port.
# First boot applies data/db-schema.sql into `bayaan` (empty volume only).
# Reset DB: `docker compose down -v` then `docker compose up -d`

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-bayaan_dev}
      MYSQL_DATABASE: bayaan
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - bayaan_mysql_data:/var/lib/mysql
      - ./data/db-schema.sql:/docker-entrypoint-initdb.d/01-bayaan.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  bayaan_mysql_data:
